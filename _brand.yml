# Brand for the course site — aligned with nilsroemer.com (Planningio design
# system subset: navy/blue palette, sky surfaces, Poppins/Inter/Space Mono).
#
# NOTE on fonts: the @font-face declarations live in styles.scss, not here.
# Quarto brand fonts do not support `unicode-range`, which the latin +
# latin-ext split requires. This file only assigns the family names;
# styles.scss self-hosts the woff2 files from /fonts (no Google Fonts CDN).

color:
  palette:
    ink:            "#1e2648"
    primary-blue:   "#01579b"
    primary-light:  "#85bae3"
    primary-faint:  "#d2e7f8"
    milk:           "#edf1f5"
    sky-100:        "#f3f8fd"
    sky-200:        "#e7f1fb"
    sky-300:        "#cfe2f4"
    sky-500:        "#9cc6e8"
    fg-2:           "#4a5578"
    fg-3:           "#8a93ad"
    border:         "#dde5ee"
    border-strong:  "#c3d2e2"
    border-faint:   "#eef3f8"
    white:          "#ffffff"
    # Course-only additions (not on nilsroemer.com): muted semantic accents
    # for slide emphasis classes and callouts — a lecture site needs
    # distinguishable warning/task/error colours, the homepage does not.
    accent-amber:   "#b07a2a"
    accent-red:     "#b0485a"
    accent-green:   "#4a7c59"
  foreground: ink
  background: white
  primary:    primary-blue
  secondary:  fg-2
  success:    accent-green
  info:       primary-light
  warning:    accent-amber
  danger:     accent-red
  light:      milk
  dark:       ink
  link:       primary-blue

typography:
  base:
    family: Inter
    line-height: 1.6
  headings:
    family: Poppins
    weight: 600
    line-height: 1.2
    color: ink
  monospace:
    family: Space Mono
  monospace-block:
    background-color: sky-100
  monospace-inline:
    color: primary-blue
    background-color: sky-100
  link:
    color: primary-blue
    decoration: underline

defaults:
  quarto:
    html:
      highlight-style: github
      code-copy: true
      code-link: true
      code-overflow: wrap
      html-math-method:
        method: mathjax
        url: "/assets/mathjax/tex-mml-chtml.js"
